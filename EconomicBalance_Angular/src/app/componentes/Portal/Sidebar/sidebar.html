<div class="sidebar" [class.open]="abierto">

    <!-- TOP -->
    <div class="sidebar-top d-flex align-items-center justify-content-between px-3 py-2">
        <img src="assets/logosinfondo.png" class="sidebar-logo" alt="Economic Balance">

        <button class="sidebar-close-btn" (click)="cerrar()">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </div>

    <!-- CONTENIDO SCROLLEABLE -->
    <div class="sidebar-content">
        <ul class="list-group list-group-flush">

            <li class="list-group-item sidebar-item" (click)="ir('dashboard')">
                {{ 'sidebar_inicio' | translate }}
            </li>

            <li class="list-group-item sidebar-item" (click)="ir('mis-plantillas')">
                {{ 'sidebar_plantillas' | translate }}
            </li>
            <li class="list-group-item sidebar-item" (click)="ir('calendario')">
                {{ 'sidebar_calendario' | translate }}
            </li>

            <li class="list-group-item sidebar-item" (click)="ir('metas')">
                {{ 'sidebar_metas_ahorro' | translate }}
            </li>



            <li class="list-group-item sidebar-item" (click)="ir('soporte')">
                {{ 'sidebar_soporte' | translate }}
            </li>

        </ul>
    </div>

    <!-- BOTÓN ABAJO DEL TODO -->
    <div class="sidebar-bottom px-3 py-3">
        <button class="btn btn-outline-dark w-100 fw-semibold" (click)="toggleTheme()">
            {{ temaOscuro ? ('sidebar_modo_claro' | translate) : ('sidebar_modo_oscuro' | translate) }}
        </button>
    </div>

</div>
