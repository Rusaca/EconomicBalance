<header class="border-bottom bg-white app-header">
  <nav class="navbar navbar-expand-lg navbar-header">
    <a class="brand-link" routerLink="/">
      <img src="/public/Logo_de_Economic_Bal.png" alt="EconomicBalance" class="brand-logo" />
    </a>

    <div class="header-auth-mobile d-flex d-lg-none align-items-center ms-auto me-2">
      <span class="texto-bienvenida" *ngIf="sesionIniciada">Hola, {{ nombreUsuario }}</span>

      <button
        class="btn btn-dark btn-sm"
        type="button"
        *ngIf="!sesionIniciada"
        routerLink="/login"
      >
        Iniciar sesion
      </button>

      <button
        class="btn btn-outline-dark btn-sm"
        type="button"
        *ngIf="sesionIniciada"
        (click)="cerrarSesion()"
      >
        Cerrar sesion
      </button>
    </div>

    <button
      class="navbar-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mainNav"
      aria-controls="mainNav"
      aria-expanded="false"
      aria-label="Abrir menu de navegacion"
    >
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <div class="d-none d-lg-flex ms-auto gap-2 align-items-center">
        <span class="texto-bienvenida" *ngIf="sesionIniciada">Hola, {{ nombreUsuario }}</span>

        <button
          class="btn btn-dark btn-sm"
          type="button"
          *ngIf="!sesionIniciada"
          routerLink="/login"
        >
          Iniciar sesion
        </button>

        <button
          class="btn btn-outline-dark btn-sm"
          type="button"
          *ngIf="sesionIniciada"
          (click)="cerrarSesion()"
        >
          Cerrar sesion
        </button>
      </div>
    </div>
  </nav>
</header>
