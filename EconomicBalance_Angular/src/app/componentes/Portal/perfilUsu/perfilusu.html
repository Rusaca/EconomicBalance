<div class="perfil-menu-contenido">

  <div class="perfil-header">
    <div class="perfil-info">
      <small>{{ correoUsuario }}</small>
    </div>
  </div>

  <button class="perfil-item" (click)="irAPerfil()">
    {{ 'perfil_editar' | translate }}
  </button>

  <button class="perfil-item" (click)="irAAjustes()">
    {{ 'perfil_ajustes' | translate }}
  </button>

  <button class="perfil-item logout" (click)="cerrarSesion()">
    {{ 'perfil_cerrar' | translate }}
  </button>
</div>
