<div class="vh-100 d-flex justify-content-center align-items-center bg-light position-relative">

  <!-- CARD CENTRAL -->
  <div class="card p-4 shadow-lg border-0 text-center card-activacion">

    <!-- LOGO CENTRADO -->
    <img src="assets/logosinfondo.png" class="logo-card mb-3 fade-in" alt="Logo">
    <h1 style="color:red; font-size:40px;">DEBUG {{ estado }}</h1>

    <!-- 🔥 CONTROL ÚNICO DE ESTADO -->
    <div [ngSwitch]="estado">

      <!-- ESTADO OK -->
      <div *ngSwitchCase="'ok'" class="fade-in">
        <div class="check-animado mx-auto"></div>

        <h2 class="fw-bold mt-3">Cuenta activada correctamente</h2>

        <button class="btn btn-primary btn-lg mt-3 shadow" (click)="cerrarVentana()">
          Cerrar ventana
        </button>
      </div>

      <!-- ESTADO ERROR -->
      <div *ngSwitchCase="'error'" class="fade-in">
        <div class="error-animado mx-auto"></div>

        <h2 class="fw-bold text-danger mt-3">Se ha producido un error</h2>

        <button class="btn btn-danger btn-lg mt-3 shadow" (click)="cerrarVentana()">
          Cerrar ventana
        </button>
      </div>

    </div>

    <!-- FOOTER PROFESIONAL -->
    <p class="footer-profesional mt-4">
      © 2026 <span class="marca">EconomicBalance</span>. Todos los derechos reservados.
    </p>

  </div>
</div>
