<video #videoElement autoplay muted [attr.muted]="true" loop playsinline preload="auto" class="video-fondo">
  <source src="assets/VideoLoginyregistro.mp4" type="video/mp4" />
</video>

<div class="overlay"></div>

<div class="container-login">
  <img src="assets/LogoSinFondoBlnc.png" alt="Economic Balance" class="logo-login" width="380" height="auto">

  <div class="card shadow p-4 tarjeta-pro">
    <h3 class="titulo-login text-center fw-bold">Inicio de sesión</h3>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label">Correo o numero de telefono</label>
        <input type="text" class="form-control" [(ngModel)]="identificador" name="identificador"
          (ngModelChange)="limpiarError()" required >
      </div>




      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" [(ngModel)]="password" name="password"
          (ngModelChange)="limpiarError()" required>
      </div>

      <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input" [(ngModel)]="remember" name="remember">
        <label class="form-check-label">Recordar sesión</label>
      </div>

      <div *ngIf="mensajeError" class="text-danger fw-semibold mb-3">
        {{ mensajeError }}
      </div>

      <button type="submit" class="btn btn-primary w-100 mb-3">
        Iniciar sesión
      </button>
    </form>

    <div class="text-center mb-3">o continuar con</div>

    <button type="button" class="btn btn-outline-danger w-100 mb-2 d-flex align-items-center justify-content-center"
      (click)="loginGoogle()">
      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="20" class="me-2">
      Continuar con Google
    </button>

    <div class="bloque-enlaces-login">
      <p class="texto-secundario-login">
        ¿No tienes cuenta?
        <a routerLink="/registro" class="enlace-login enlace-registro">Regístrate</a>
      </p>

      <p class="texto-secundario-login mb-0">
        <a routerLink="/recuperar-password" class="enlace-login enlace-recuperar">
          ¿Has olvidado tu contraseña?
        </a>
      </p>
    </div>
  </div>
</div>
