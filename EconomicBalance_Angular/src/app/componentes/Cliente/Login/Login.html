<div class="container vh-100 d-flex justify-content-center align-items-center">

  <div class="card shadow p-4" style="width:380px">

    <h3 class="text-center mb-4">Iniciar sesión</h3>

    <form (ngSubmit)="login()">

      <div class="mb-3">
        <label class="form-label">Correo electrónico</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required>
      </div>

      <div class="form-check mb-3">
        <input
          type="checkbox"
          class="form-check-input"
          [(ngModel)]="remember"
          name="remember">
        <label class="form-check-label">
          Recordar sesión
        </label>
      </div>

      <button class="btn btn-primary w-100 mb-3">
        Iniciar sesión
      </button>

    </form>

    <div class="text-center mb-3">
      o continuar con
    </div>

    <!-- Google -->

    <button class="btn btn-outline-danger w-100 mb-2 d-flex align-items-center justify-content-center"
            (click)="loginGoogle()">

      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg"
           width="20"
           class="me-2">

      Continuar con Google

    </button>

    <!-- Apple -->

    <button class="btn btn-dark w-100 d-flex align-items-center justify-content-center"
            (click)="loginApple()">

      <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apple/apple-original.svg"
           width="20"
           class="me-2">

      Continuar con Apple

    </button>

    <div class="text-center mt-3">
      ¿No tienes cuenta?
      <a routerLink="/registro">Registrate</a>
    </div>

  </div>

</div>
