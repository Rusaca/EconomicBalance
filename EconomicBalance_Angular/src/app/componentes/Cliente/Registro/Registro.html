<div class="container vh-100 d-flex justify-content-center align-items-center">

  <div class="card shadow p-4" style="width:400px">

    <h3 class="text-center mb-4">Crear cuenta</h3>

    <form (ngSubmit)="register()">

      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="nombre"
          name="nombre"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Apellidos</label>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="apellidos"
          name="apellidos"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Correo</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="correo"
          name="correo"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          required>
      </div>

      <div class="mb-3">
        <label class="form-label">Confirmar contraseña</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required>
      </div>

      <button class="btn btn-success w-100">
        Registrarse
      </button>

    </form>

    <div class="text-center mt-3">

      ¿Ya tienes cuenta?
      <a routerLink="/login">
        Iniciar sesión
      </a>

    </div>

  </div>

</div>
