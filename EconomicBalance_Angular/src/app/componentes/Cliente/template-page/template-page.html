<div class="barra-superior">

  <button class="btn btn-primary"
          (click)="guardarPlantilla()"
          [disabled]="guardando">
    {{ guardando ? 'Guardando...' : 'Guardar plantilla' }}
  </button>

    <span class="mensaje" *ngIf="mensajeGuardado">
      {{ mensajeGuardado }}
    </span>
  </div>
</div>

<div class="lienzo" (contextmenu)="abrirMenuLienzo($event)">

  <!-- 🔲 BLOQUES -->
  <div
    class="bloque"
    *ngFor="let bloque of template?.blocks"
    [style.left.px]="bloque.x"
    [style.top.px]="bloque.y"
    (contextmenu)="abrirMenuBloque($event, bloque)"
  >

     <div
      class="titulo d-flex justify-content-between align-items-center gap-2"
      (mousedown)="startDrag($event, bloque)"
    >
      <input
        class="form-control form-control-sm"
        type="text"
        [(ngModel)]="bloque.titulo"
        placeholder="Título del bloque"
        (mousedown)="$event.stopPropagation()"
      />

  

    <div *ngFor="let campo of bloque.campos" class="campo d-flex flex-column gap-2 mt-2">
      <div class="d-flex justify-content-between align-items-start gap-2">
        <div>
          <strong>{{ campo.nombre }}</strong>
          <div class="small text-muted">
            {{ campo.categoria || 'Sin categoría' }} · {{ campo.tipo }} · {{ campo.cantidad }} €
          </div>
        </div>

        <div class="d-flex gap-1">
          <button
            type="button"
            class="btn btn-sm btn-outline-primary"
            (click)="editarCampo(bloque, campo)"
          >
            Editar
          </button>

          <button
            type="button"
            class="btn btn-sm btn-outline-danger"
            (click)="eliminarCampo(bloque, campo.id)"
          >
            Eliminar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 📌 MENÚ CONTEXTUAL LIENZO -->
  <div
    class="menu"
    *ngIf="menuLienzo.visible"
    [style.left.px]="menuLienzo.x"
    [style.top.px]="menuLienzo.y"
    (click)="$event.stopPropagation()"
  >
    <div class="opcion-menu" (click)="crearBloque()">
      ➕ Crear bloque
    </div>
  </div>

  <!-- 📌 MENÚ CONTEXTUAL BLOQUE -->
  <div
    class="menu menu-fixed"
    *ngIf="menuBloque.visible"
    [style.left.px]="menuBloque.x"
    [style.top.px]="menuBloque.y"
    (click)="$event.stopPropagation()"
  >
    <div class="opcion-menu" (click)="abrirPopupCampo()">
      ➕ Crear campo
    </div>

    <div
      class="opcion-menu"
      *ngIf="menuBloque.bloque"
      (click)="clonarBloque(menuBloque.bloque!)"
    >
      📄 Clonar bloque
    </div>

    <div
      class="opcion-menu"
      *ngIf="menuBloque.bloque"
      (click)="calcularTotalBloque(menuBloque.bloque!)"
    >
      🧮 Calcular total
    </div>

    <div
      class="opcion-menu text-danger"
      *ngIf="menuBloque.bloque"
      (click)="eliminarBloque(menuBloque.bloque!.id)"
    >
      🗑️ Eliminar bloque
    </div>
  </div>
</div>

<div class="overlay" *ngIf="popupCampoVisible">
  <div class="popup" (click)="$event.stopPropagation()">
    <h3>{{ campoEditandoId ? 'Editar campo' : 'Nuevo campo' }}</h3>

    <label>Tipo</label>
    <select [(ngModel)]="nuevoCampo.tipo">
      <option value="ingreso">Ingreso</option>
      <option value="gasto">Gasto</option>
    </select>

    <label>Categoría</label>
    <input type="text" [(ngModel)]="nuevoCampo.categoria" />

    <label>Nombre</label>
    <input type="text" [(ngModel)]="nuevoCampo.nombre" />

    <label>Cantidad</label>
    <input type="number" min="0" step="0.01" [(ngModel)]="nuevoCampo.cantidad" />

    <div class="acciones">
      <button class="btn btn-success" (click)="guardarCampo()">
        Guardar
      </button>

      <button class="btn btn-secondary" (click)="cerrarPopupCampo()">
        Cancelar
      </button>
    </div>
  </div>
</div>

<div class="overlay" *ngIf="popupNombrePlantillaVisible">
  <div class="popup" (click)="$event.stopPropagation()">
    <h3>Guardar plantilla</h3>

    <label>Nombre de la plantilla</label>
    <input
      type="text"
      [(ngModel)]="nombrePlantillaTemporal"
      placeholder="Ej. Presupuesto familiar"
    />

    <div class="acciones">
      <button class="btn btn-success" type="button" (click)="confirmarPrimerGuardado()" [disabled]="guardando">
        Confirmar
      </button>

      <button class="btn btn-secondary" type="button" (click)="cancelarPrimerGuardado()" [disabled]="guardando">
        Cancelar
      </button>
    </div>
  </div>
</div>
