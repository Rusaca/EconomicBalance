<!-- 🔝 BARRA SUPERIOR -->
<div class="barra-superior">

  <button class="btn btn-primary"
          (click)="guardarPlantilla()"
          [disabled]="guardando">
    {{ guardando ? 'Guardando...' : 'Guardar plantilla' }}
  </button>

  <span class="mensaje" *ngIf="mensajeGuardado">
    {{ mensajeGuardado }}
  </span>

</div>

<!-- 🟦 LIENZO -->
<div class="lienzo" (contextmenu)="abrirMenuLienzo($event)">

  <!-- 🔲 BLOQUES -->
  <div
    class="bloque"
    *ngFor="let bloque of template?.blocks"
    [style.left.px]="bloque.x"
    [style.top.px]="bloque.y"
    (mousedown)="startDrag($event, bloque)"
    (contextmenu)="abrirMenuBloque($event, bloque)"
  >

    <div class="titulo">
      {{ bloque.titulo }}
    </div>

    <!-- CAMPOS -->
    <div *ngFor="let campo of bloque.campos" class="campo">
      <strong>{{ campo.nombre }}</strong>
      <span> - {{ campo.tipo }} - {{ campo.cantidad }}€</span>
    </div>

  </div>

  <!-- 📌 MENÚ CONTEXTUAL LIENZO -->
  <div
    class="menu"
    *ngIf="menuLienzo.visible"
    [style.left.px]="menuLienzo.x"
    [style.top.px]="menuLienzo.y"
    (click)="$event.stopPropagation()"
  >
    <div class="opcion-menu" (click)="crearBloque()">
      ➕ Crear bloque
    </div>
  </div>

  <!-- 📌 MENÚ CONTEXTUAL BLOQUE -->
  <div
    class="menu menu-fixed"
    *ngIf="menuBloque.visible"
    [style.left.px]="menuBloque.x"
    [style.top.px]="menuBloque.y"
    (click)="$event.stopPropagation()"
  >
    <div class="opcion-menu" (click)="abrirPopupCampo()">
      ➕ Crear campo
    </div>
  </div>

</div>

<!-- 🪟 POPUP CREAR CAMPO -->
<div class="overlay" *ngIf="popupCampoVisible">

  <div class="popup" (click)="$event.stopPropagation()">

    <h3>Nuevo campo</h3>

    <!-- TIPO -->
    <label>Tipo</label>
    <select [(ngModel)]="nuevoCampo.tipo">
      <option value="ingreso">Ingreso</option>
      <option value="gasto">Gasto</option>
    </select>

    <!-- CATEGORÍA -->
    <label>Categoría</label>
    <input type="text" [(ngModel)]="nuevoCampo.categoria" />

    <!-- NOMBRE -->
    <label>Nombre</label>
    <input type="text" [(ngModel)]="nuevoCampo.nombre" />

    <!-- CANTIDAD -->
    <label>Cantidad</label>
    <input type="number" [(ngModel)]="nuevoCampo.cantidad" />

    <!-- BOTONES -->
    <div class="acciones">
      <button class="btn btn-success" (click)="guardarCampo()">
        Guardar
      </button>

      <button class="btn btn-secondary" (click)="cerrarPopupCampo()">
        Cancelar
      </button>
    </div>

  </div>

</div>
