<div class="container my-4" *ngIf="template">

  <div class="d-flex justify-content-between align-items-start gap-3">
    <div>
      <h1 class="fw-bold mb-1">{{ template.name }}</h1>
      <p class="text-muted mb-0">ID: {{ template.id }}</p>
    </div>

    <button class="btn btn-dark" (click)="addBlock()">
      + Añadir bloque
    </button>
  </div>

  <hr class="my-4" />

  <!-- Estado vacío -->
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body">
      <h5 class="fw-bold mb-2">Plantilla en blanco ✅</h5>
      <p class="text-muted mb-0">
        Aquí es donde luego construiremos el editor tipo Notion:
        bloques, campos, gastos/ingresos, etc.
      </p>
    </div>
  </div>

  <!-- Debug opcional (puedes borrarlo cuando quieras) -->
  <pre class="mt-3 small bg-light p-3 rounded-3">{{ template | json }}</pre>

</div>
